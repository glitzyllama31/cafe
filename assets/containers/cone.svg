<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 220" width="140" height="220">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0B060"/>
      <stop offset="35%" stop-color="#D49840"/>
      <stop offset="65%" stop-color="#C88830"/>
      <stop offset="100%" stop-color="#A06818"/>
    </linearGradient>
    <linearGradient id="cs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#906020" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#906020" stop-opacity="0"/>
      <stop offset="70%" stop-color="#906020" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#906020" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ch" x1="30%" y1="0%" x2="70%" y2="0%">
      <stop offset="0%" stop-color="#F0D080" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F0D080" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F0D080" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="cc">
      <path d="M 18,28 Q 20,22 30,20 L 110,20 Q 120,22 122,28 L 78,215 Q 75,220 70,220 Q 65,220 62,215 Z"/>
    </clipPath>
    <filter id="coneTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>
  <!-- Cone body with organic shape -->
  <path d="M 18,28 Q 20,22 30,20 L 110,20 Q 120,22 122,28 L 78,215 Q 75,220 70,220 Q 65,220 62,215 Z" 
        fill="url(#cg)" stroke="#8B5E1A" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Waffle cross-hatch pattern -->
  <g clip-path="url(#cc)" stroke="#9B6818" stroke-width="1.4" fill="none" opacity="0.45">
    <!-- Left-leaning diagonals -->
    <line x1="-5" y1="20" x2="55" y2="220"/>
    <line x1="10" y1="20" x2="65" y2="220"/>
    <line x1="25" y1="20" x2="78" y2="220"/>
    <line x1="40" y1="20" x2="88" y2="220"/>
    <line x1="55" y1="20" x2="98" y2="220"/>
    <line x1="70" y1="20" x2="108" y2="220"/>
    <line x1="85" y1="20" x2="118" y2="220"/>
    <line x1="100" y1="20" x2="128" y2="220"/>
    <line x1="115" y1="20" x2="138" y2="220"/>
    <!-- Right-leaning diagonals -->
    <line x1="145" y1="20" x2="85" y2="220"/>
    <line x1="130" y1="20" x2="75" y2="220"/>
    <line x1="115" y1="20" x2="65" y2="220"/>
    <line x1="100" y1="20" x2="55" y2="220"/>
    <line x1="85" y1="20" x2="48" y2="220"/>
    <line x1="70" y1="20" x2="40" y2="220"/>
    <line x1="55" y1="20" x2="32" y2="220"/>
    <line x1="40" y1="20" x2="22" y2="220"/>
    <line x1="25" y1="20" x2="12" y2="220"/>
  </g>
  <!-- Depth shading on left and right edges -->
  <path d="M 18,28 Q 20,22 30,20 L 110,20 Q 120,22 122,28 L 78,215 Q 75,220 70,220 Q 65,220 62,215 Z" 
        fill="url(#cs)"/>
  <!-- Center highlight strip -->
  <path d="M 18,28 Q 20,22 30,20 L 110,20 Q 120,22 122,28 L 78,215 Q 75,220 70,220 Q 65,220 62,215 Z" 
        fill="url(#ch)"/>
  <!-- Baked edge darkening at bottom -->
  <path d="M 68,180 Q 65,200 62,215 Q 65,220 70,220 Q 75,220 78,215 L 72,180 Z" fill="#905818" opacity="0.25"/>
  <!-- Rim - thick rolled edge -->
  <ellipse cx="70" cy="24" rx="54" ry="10" fill="#D49840" stroke="#8B5E1A" stroke-width="1.8"/>
  <!-- Rim highlight -->
  <ellipse cx="70" cy="22" rx="48" ry="6" fill="#E8C068" opacity="0.5"/>
  <!-- Rim inner shadow -->
  <ellipse cx="70" cy="26" rx="46" ry="5" fill="#A07020" opacity="0.3"/>
  <!-- Crispy texture dots along the rim -->
  <g fill="#B07820" opacity="0.3">
    <circle cx="30" cy="23" r="1.5"/>
    <circle cx="42" cy="21" r="1.2"/>
    <circle cx="55" cy="20" r="1.4"/>
    <circle cx="68" cy="19" r="1.3"/>
    <circle cx="82" cy="20" r="1.5"/>
    <circle cx="95" cy="21" r="1.2"/>
    <circle cx="108" cy="23" r="1.4"/>
  </g>
</svg>
