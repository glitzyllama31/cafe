<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 120" width="36" height="120">
  <defs>
    <linearGradient id="fk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4A2210"/>
      <stop offset="20%" stop-color="#6B3A1F"/>
      <stop offset="40%" stop-color="#5C3018"/>
      <stop offset="60%" stop-color="#7B4828"/>
      <stop offset="80%" stop-color="#5C3018"/>
      <stop offset="100%" stop-color="#3E1A0A"/>
    </linearGradient>
  </defs>
  <!-- Flake body with slightly irregular edges -->
  <path d="M 8,4 Q 10,0 14,1 L 22,1 Q 26,0 28,4 
           L 29,28 L 27,52 L 29,76 L 27,100 L 28,116 
           Q 28,120 24,120 L 12,120 Q 8,120 8,116 
           L 9,100 L 7,76 L 9,52 L 7,28 Z" 
        fill="url(#fk)" stroke="#2E1408" stroke-width="1"/>
  <!-- Flake ridges - horizontal grooves -->
  <g stroke="#3A1808" stroke-width="0.8" opacity="0.45" fill="none">
    <path d="M 8,12 Q 18,10 28,12"/>
    <path d="M 7,22 Q 18,20 29,22"/>
    <path d="M 8,32 Q 18,30 28,32"/>
    <path d="M 7,42 Q 18,40 29,42"/>
    <path d="M 8,52 Q 18,50 28,52"/>
    <path d="M 7,62 Q 18,60 29,62"/>
    <path d="M 8,72 Q 18,70 28,72"/>
    <path d="M 7,82 Q 18,80 29,82"/>
    <path d="M 8,92 Q 18,90 28,92"/>
    <path d="M 7,102 Q 18,100 29,102"/>
    <path d="M 8,112 Q 18,110 28,112"/>
  </g>
  <!-- Center highlight ridge -->
  <path d="M 16,2 L 15,118" stroke="#8B5838" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
  <!-- Left shadow -->
  <path d="M 8,4 L 7,28 L 9,52 L 7,76 L 9,100 L 8,116 Q 8,120 12,120 L 14,120 
           Q 10,120 10,116 L 11,100 L 9,76 L 11,52 L 9,28 L 10,4 Z" 
        fill="#2A1206" opacity="0.2"/>
  <!-- Crumbly broken top edge -->
  <path d="M 8,4 L 10,2 L 13,5 L 16,1 L 19,4 L 22,1 L 25,3 L 28,4" 
        fill="url(#fk)" stroke="#2E1408" stroke-width="0.8"/>
  <!-- Tiny crumbs at top -->
  <circle cx="6" cy="6" r="1.5" fill="#5C3018" opacity="0.6"/>
  <circle cx="30" cy="3" r="1.2" fill="#5C3018" opacity="0.5"/>
  <circle cx="4" cy="10" r="1" fill="#4A2210" opacity="0.4"/>
</svg>
