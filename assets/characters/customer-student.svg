<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 260" width="180" height="260">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE4CC"/>
      <stop offset="60%" stop-color="#F8D4B0"/>
      <stop offset="100%" stop-color="#EDBE92"/>
    </radialGradient>
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9088" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF9088" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="40%" stop-color="#6B422A"/>
      <stop offset="100%" stop-color="#4A2E1A"/>
    </linearGradient>
    <linearGradient id="hairHL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A87050" stop-opacity="0"/>
      <stop offset="30%" stop-color="#B88060" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#A87050" stop-opacity="0"/>
      <stop offset="100%" stop-color="#B88060" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5AB4E8"/>
      <stop offset="100%" stop-color="#3890C8"/>
    </linearGradient>
  </defs>

  <!-- Hair back - full flowing shape -->
  <path d="M 40,50 C 30,48 18,58 14,80 Q 8,110 12,150 Q 14,175 22,195 
           Q 26,205 34,200 Q 28,175 26,150 Q 22,110 28,80 Q 32,65 40,58 Z" fill="url(#hair)"/>
  <path d="M 140,50 C 150,48 162,58 166,80 Q 172,110 168,150 Q 166,175 158,195 
           Q 154,205 146,200 Q 152,175 154,150 Q 158,110 152,80 Q 148,65 140,58 Z" fill="url(#hair)"/>
  <!-- More hair flowing behind shoulders -->
  <path d="M 22,150 Q 18,170 20,190 Q 22,210 30,218 Q 36,222 38,215 Q 32,205 28,190 Q 24,170 26,150 Z" fill="#5A3820" opacity="0.7"/>
  <path d="M 158,150 Q 162,170 160,190 Q 158,210 150,218 Q 144,222 142,215 Q 148,205 152,190 Q 156,170 154,150 Z" fill="#5A3820" opacity="0.7"/>

  <!-- Neck -->
  <path d="M 74,150 L 72,172 Q 74,178 82,180 L 98,180 Q 106,178 108,172 L 106,150" 
        fill="url(#skin)" stroke="#D4A880" stroke-width="0.8"/>

  <!-- Body / blue top -->
  <path d="M 36,178 Q 30,185 28,200 Q 26,230 36,260 L 144,260 
           Q 154,230 152,200 Q 150,185 144,178 
           Q 130,170 100,172 L 80,172 Q 50,170 36,178 Z" 
        fill="url(#shirt)" stroke="#2E78A8" stroke-width="1.5"/>
  <!-- Shirt neckline -->
  <path d="M 68,176 Q 76,168 82,172 L 98,172 Q 104,168 112,176" 
        fill="none" stroke="#2E78A8" stroke-width="1.8"/>
  <!-- Shirt wrinkle lines -->
  <path d="M 60,200 Q 70,195 80,198" fill="none" stroke="#3890C8" stroke-width="1" opacity="0.35"/>
  <path d="M 100,198 Q 110,195 120,200" fill="none" stroke="#3890C8" stroke-width="1" opacity="0.35"/>
  <path d="M 75,220 Q 85,216 95,220" fill="none" stroke="#3890C8" stroke-width="0.8" opacity="0.3"/>

  <!-- Face -->
  <ellipse cx="90" cy="100" rx="52" ry="58" fill="url(#skin)" stroke="#D4A880" stroke-width="1"/>

  <!-- Hair front - layered bangs and top -->
  <path d="M 38,60 Q 42,22 90,16 Q 138,22 142,60 
           Q 136,38 90,32 Q 44,38 38,60 Z" fill="url(#hair)"/>
  <!-- Bangs - side-swept layers -->
  <path d="M 42,58 Q 48,32 68,38 Q 56,28 44,44 Z" fill="url(#hair)"/>
  <path d="M 48,54 Q 56,28 78,36 Q 62,24 50,42 Z" fill="url(#hair)"/>
  <path d="M 54,52 Q 64,26 86,34 Q 70,22 56,40 Z" fill="url(#hair)"/>
  <!-- Hair highlight streaks -->
  <path d="M 38,60 Q 42,22 90,16 Q 138,22 142,60 
           Q 136,38 90,32 Q 44,38 38,60 Z" fill="url(#hairHL)"/>

  <!-- Sunglasses pushed up on head -->
  <g transform="translate(0,-4)">
    <rect x="44" y="38" width="30" height="16" rx="8" fill="#2A2A38" opacity="0.85"/>
    <rect x="106" y="38" width="30" height="16" rx="8" fill="#2A2A38" opacity="0.85"/>
    <path d="M 74,46 Q 90,50 106,46" fill="none" stroke="#2A2A38" stroke-width="2.5"/>
    <line x1="44" y1="44" x2="34" y2="40" stroke="#2A2A38" stroke-width="2"/>
    <line x1="136" y1="44" x2="146" y2="40" stroke="#2A2A38" stroke-width="2"/>
    <!-- Lens tint -->
    <rect x="46" y="40" width="26" height="12" rx="6" fill="#C8A020" opacity="0.2"/>
    <rect x="108" y="40" width="26" height="12" rx="6" fill="#C8A020" opacity="0.2"/>
    <!-- Lens glare -->
    <ellipse cx="54" cy="44" rx="4" ry="2" fill="white" opacity="0.15"/>
    <ellipse cx="116" cy="44" rx="4" ry="2" fill="white" opacity="0.15"/>
  </g>

  <!-- Eyes -->
  <g>
    <!-- Left eye -->
    <ellipse cx="70" cy="96" rx="10" ry="11" fill="white"/>
    <ellipse cx="70" cy="96" rx="9" ry="10" fill="white" stroke="#C8A080" stroke-width="0.5"/>
    <circle cx="72" cy="97" r="6.5" fill="#5C3820"/>
    <circle cx="72" cy="97" r="4" fill="#2A1408"/>
    <circle cx="69" cy="94" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="74" cy="99" r="1.2" fill="white" opacity="0.5"/>
    <!-- Upper eyelid line -->
    <path d="M 59,90 Q 70,86 82,90" fill="none" stroke="#6B422A" stroke-width="2" stroke-linecap="round"/>
    <!-- Lashes -->
    <path d="M 59,90 Q 56,86 55,83" fill="none" stroke="#6B422A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 63,88 Q 61,84 60,81" fill="none" stroke="#6B422A" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="110" cy="96" rx="10" ry="11" fill="white"/>
    <ellipse cx="110" cy="96" rx="9" ry="10" fill="white" stroke="#C8A080" stroke-width="0.5"/>
    <circle cx="112" cy="97" r="6.5" fill="#5C3820"/>
    <circle cx="112" cy="97" r="4" fill="#2A1408"/>
    <circle cx="109" cy="94" r="2.5" fill="white" opacity="0.85"/>
    <circle cx="114" cy="99" r="1.2" fill="white" opacity="0.5"/>
    <!-- Upper eyelid line -->
    <path d="M 98,90 Q 110,86 122,90" fill="none" stroke="#6B422A" stroke-width="2" stroke-linecap="round"/>
    <!-- Lashes -->
    <path d="M 122,90 Q 125,86 126,83" fill="none" stroke="#6B422A" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 118,88 Q 120,84 121,81" fill="none" stroke="#6B422A" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Eyebrows -->
  <path d="M 56,80 Q 68,74 82,80" fill="none" stroke="#5A3420" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 98,80 Q 112,74 124,80" fill="none" stroke="#5A3420" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 88,106 Q 90,112 88,116 Q 86,118 84,116" fill="none" stroke="#D4A880" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mouth group (swappable for expressions) -->
  <g data-mouth="true">
    <path d="M 72,126 Q 80,118 90,126 Q 100,118 108,126" fill="none" stroke="#D88080" stroke-width="1.2" opacity="0.5"/>
    <path d="M 74,126 Q 90,140 106,126" fill="#E89090" opacity="0.5"/>
    <path d="M 74,126 Q 90,140 106,126" fill="none" stroke="#C87070" stroke-width="2" stroke-linecap="round"/>
    <path d="M 80,128 L 100,128" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Cheek blush -->
  <circle cx="54" cy="114" r="12" fill="url(#blush)"/>
  <circle cx="126" cy="114" r="12" fill="url(#blush)"/>

  <!-- Chin dimple hint -->
  <path d="M 88,142 Q 90,144 92,142" fill="none" stroke="#D4A880" stroke-width="0.8" opacity="0.5"/>
</svg>
