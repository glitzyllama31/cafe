<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">
  <defs>
    <filter id="bs">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Bubble body -->
  <rect x="12" y="10" width="296" height="160" rx="24" ry="24" fill="white" filter="url(#bs)"/>
  <!-- Thick border - matching mockup's dark rounded border -->
  <rect x="12" y="10" width="296" height="160" rx="24" ry="24" fill="none" stroke="#505860" stroke-width="5"/>
  <!-- Tail pointing to the right (toward customer) -->
  <path d="M 230,170 L 270,210 L 250,170" fill="white"/>
  <path d="M 232,168 L 270,210 L 248,168" fill="none" stroke="#505860" stroke-width="5" stroke-linejoin="round"/>
  <!-- Cover border where tail meets bubble -->
  <rect x="234" y="160" width="14" height="14" fill="white"/>
</svg>
