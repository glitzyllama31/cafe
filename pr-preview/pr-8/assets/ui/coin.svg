<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="coinG" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#FFE860"/>
      <stop offset="40%" stop-color="#F0C800"/>
      <stop offset="100%" stop-color="#C8A000"/>
    </radialGradient>
    <radialGradient id="coinH" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Shadow edge -->
  <ellipse cx="24" cy="26" rx="20" ry="20" fill="#A08000" opacity="0.4"/>
  <!-- Coin body -->
  <circle cx="24" cy="24" r="20" fill="url(#coinG)" stroke="#B89800" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="24" cy="24" r="15.5" fill="none" stroke="#D4A800" stroke-width="1.5" opacity="0.5"/>
  <!-- Dollar sign -->
  <text x="24" y="31" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#A88800">$</text>
  <!-- Highlight -->
  <circle cx="24" cy="24" r="19" fill="url(#coinH)"/>
  <!-- Edge notches -->
  <g stroke="#B89800" stroke-width="1" opacity="0.3">
    <line x1="24" y1="4" x2="24" y2="7"/>
    <line x1="24" y1="41" x2="24" y2="44"/>
    <line x1="4" y1="24" x2="7" y2="24"/>
    <line x1="41" y1="24" x2="44" y2="24"/>
  </g>
</svg>
