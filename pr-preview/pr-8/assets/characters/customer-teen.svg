<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 260" width="180" height="260">
  <defs>
    <radialGradient id="sk4" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F0D8B8"/>
      <stop offset="100%" stop-color="#E0C098"/>
    </radialGradient>
    <linearGradient id="blondeH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D050"/>
      <stop offset="50%" stop-color="#E0B838"/>
      <stop offset="100%" stop-color="#C8A028"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F04880"/>
      <stop offset="100%" stop-color="#D03068"/>
    </linearGradient>
  </defs>
  <!-- Hair back - blonde flowing -->
  <path d="M 40,52 C 28,54 16,66 12,88 Q 6,120 10,160 Q 14,185 22,200 
           Q 28,208 34,204 Q 26,180 24,155 Q 20,118 28,86 Q 32,68 42,60 Z" fill="url(#blondeH)"/>
  <path d="M 140,52 C 152,54 164,66 168,88 Q 174,120 170,160 Q 166,185 158,200 
           Q 152,208 146,204 Q 154,180 156,155 Q 160,118 152,86 Q 148,68 138,60 Z" fill="url(#blondeH)"/>
  <!-- Neck -->
  <path d="M 74,148 L 72,168 Q 76,174 84,176 L 96,176 Q 104,174 108,168 L 106,148" fill="url(#sk4)"/>
  <!-- Body / pink hoodie -->
  <path d="M 32,174 Q 24,182 22,200 Q 20,235 32,260 L 148,260 
           Q 160,235 158,200 Q 156,182 148,174 
           Q 130,166 100,168 L 80,168 Q 50,166 32,174 Z" 
        fill="url(#hoodie)" stroke="#B82858" stroke-width="1.5"/>
  <!-- Hood at back of neck -->
  <path d="M 56,174 Q 50,164 54,158 Q 60,152 72,156 L 108,156 Q 120,152 126,158 Q 130,164 124,174" 
        fill="#E04478" stroke="#B82858" stroke-width="1"/>
  <!-- Hoodie strings -->
  <line x1="72" y1="176" x2="66" y2="206" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="66" cy="208" r="2.5" fill="white"/>
  <line x1="108" y1="176" x2="114" y2="206" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="114" cy="208" r="2.5" fill="white"/>
  <!-- Hoodie pocket -->
  <path d="M 56,220 Q 56,230 66,232 L 114,232 Q 124,230 124,220" fill="none" stroke="#B82858" stroke-width="1.5"/>
  <!-- Face -->
  <ellipse cx="90" cy="100" rx="50" ry="55" fill="url(#sk4)" stroke="#C8A878" stroke-width="0.8"/>
  <!-- Hair front - blonde side-swept -->
  <path d="M 40,56 Q 46,16 90,10 Q 134,16 140,56 
           Q 132,32 90,26 Q 48,32 40,56 Z" fill="url(#blondeH)"/>
  <!-- Side swept bangs -->
  <path d="M 42,52 Q 48,24 72,32 Q 56,18 44,40 Z" fill="url(#blondeH)"/>
  <path d="M 48,48 Q 56,22 80,30 Q 62,16 50,38 Z" fill="url(#blondeH)"/>
  <!-- Blonde highlight streaks -->
  <path d="M 60,30 Q 66,20 74,28" fill="none" stroke="#F8E870" stroke-width="2" opacity="0.5"/>
  <path d="M 95,24 Q 105,18 115,28" fill="none" stroke="#F8E870" stroke-width="2" opacity="0.4"/>
  <!-- Eyes - half-lidded cool look -->
  <ellipse cx="70" cy="96" rx="9" ry="8" fill="white"/>
  <circle cx="72" cy="97" r="5.5" fill="#4488CC"/>
  <circle cx="72" cy="97" r="3.5" fill="#2260A0"/>
  <circle cx="70" cy="95" r="2" fill="white" opacity="0.8"/>
  <!-- Half-closed upper lid for cool look -->
  <path d="M 59,92 Q 70,90 82,92" fill="url(#sk4)" stroke="#C0A028" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="110" cy="96" rx="9" ry="8" fill="white"/>
  <circle cx="112" cy="97" r="5.5" fill="#4488CC"/>
  <circle cx="112" cy="97" r="3.5" fill="#2260A0"/>
  <circle cx="110" cy="95" r="2" fill="white" opacity="0.8"/>
  <path d="M 98,92 Q 110,90 122,92" fill="url(#sk4)" stroke="#C0A028" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyebrows - one slightly raised -->
  <path d="M 56,80 Q 68,76 82,82" fill="none" stroke="#B89828" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 98,80 Q 112,74 124,80" fill="none" stroke="#B89828" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M 88,106 Q 90,112 88,114" fill="none" stroke="#C8A878" stroke-width="1.5"/>
  <!-- Mouth group (swappable for expressions) -->
  <g data-mouth="true">
    <path d="M 78,124 Q 90,130 106,124" fill="none" stroke="#C09078" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 102,124 Q 108,122 112,118" fill="none" stroke="#C09078" stroke-width="1.8" stroke-linecap="round"/>
  </g>
  <!-- Earbud -->
  <circle cx="36" cy="106" r="6" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
  <circle cx="36" cy="106" r="2.5" fill="#D0D0D0"/>
  <!-- Earbud wire -->
  <path d="M 36,112 Q 38,130 44,148 Q 48,160 56,168" fill="none" stroke="white" stroke-width="1.2" opacity="0.6"/>
</svg>
