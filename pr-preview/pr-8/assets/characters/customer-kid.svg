<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 260" width="180" height="260">
  <defs>
    <radialGradient id="sk3" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFE0C0"/>
      <stop offset="100%" stop-color="#F0C898"/>
    </radialGradient>
    <radialGradient id="bl3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8878" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF8878" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Curly hair back - big and bouncy -->
  <g fill="#D44A1A">
    <circle cx="90" cy="55" r="58"/>
    <circle cx="38" cy="55" r="16"/>
    <circle cx="142" cy="55" r="16"/>
    <circle cx="30" cy="75" r="14"/>
    <circle cx="150" cy="75" r="14"/>
    <circle cx="26" cy="95" r="12"/>
    <circle cx="154" cy="95" r="12"/>
  </g>
  <!-- Neck (shorter - kid) -->
  <rect x="76" y="142" width="28" height="14" rx="5" fill="url(#sk3)"/>
  <!-- Body / colorful t-shirt -->
  <path d="M 38,154 Q 30,162 28,180 Q 26,220 36,260 L 144,260 
           Q 154,220 152,180 Q 150,162 142,154 Q 124,148 100,150 L 80,150 Q 56,148 38,154 Z" 
        fill="#50B848" stroke="#38982C" stroke-width="1.5"/>
  <!-- Rainbow stripe on shirt -->
  <g clip-path="url(#shirtClip)" opacity="0.5">
    <rect x="26" y="190" width="130" height="5" fill="#FF4040"/>
    <rect x="26" y="195" width="130" height="5" fill="#FF8830"/>
    <rect x="26" y="200" width="130" height="5" fill="#FFD830"/>
    <rect x="26" y="205" width="130" height="5" fill="#40C040"/>
    <rect x="26" y="210" width="130" height="5" fill="#4088FF"/>
    <rect x="26" y="215" width="130" height="5" fill="#8840C0"/>
  </g>
  <clipPath id="shirtClip">
    <path d="M 38,154 Q 30,162 28,180 Q 26,220 36,260 L 144,260 Q 154,220 152,180 Q 150,162 142,154 Q 124,148 100,150 L 80,150 Q 56,148 38,154 Z"/>
  </clipPath>
  <!-- Face (rounder/younger) -->
  <ellipse cx="90" cy="100" rx="48" ry="52" fill="url(#sk3)" stroke="#D4A880" stroke-width="0.8"/>
  <!-- Curly hair front -->
  <g fill="#D44A1A">
    <path d="M 42,56 Q 48,18 90,12 Q 132,18 138,56 Q 130,30 90,24 Q 50,30 42,56 Z"/>
    <circle cx="50" cy="36" r="12"/>
    <circle cx="68" cy="28" r="11"/>
    <circle cx="90" cy="24" r="10"/>
    <circle cx="112" cy="28" r="11"/>
    <circle cx="130" cy="36" r="12"/>
    <!-- Extra curl puffs -->
    <circle cx="42" cy="50" r="10"/>
    <circle cx="138" cy="50" r="10"/>
  </g>
  <!-- Hair highlight curls -->
  <g fill="#E86030" opacity="0.4">
    <circle cx="55" cy="32" r="6"/>
    <circle cx="80" cy="22" r="5"/>
    <circle cx="105" cy="24" r="5"/>
    <circle cx="125" cy="32" r="6"/>
  </g>
  <!-- Big excited eyes -->
  <ellipse cx="70" cy="94" rx="12" ry="13" fill="white" stroke="#C8A080" stroke-width="0.5"/>
  <circle cx="73" cy="96" r="8" fill="#308830"/>
  <circle cx="73" cy="96" r="5" fill="#1A5A14"/>
  <circle cx="69" cy="92" r="3.2" fill="white" opacity="0.9"/>
  <circle cx="76" cy="99" r="1.5" fill="white" opacity="0.6"/>
  <ellipse cx="110" cy="94" rx="12" ry="13" fill="white" stroke="#C8A080" stroke-width="0.5"/>
  <circle cx="113" cy="96" r="8" fill="#308830"/>
  <circle cx="113" cy="96" r="5" fill="#1A5A14"/>
  <circle cx="109" cy="92" r="3.2" fill="white" opacity="0.9"/>
  <circle cx="116" cy="99" r="1.5" fill="white" opacity="0.6"/>
  <!-- Raised excited eyebrows -->
  <path d="M 56,76 Q 68,68 84,76" fill="none" stroke="#A83810" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 96,76 Q 112,68 124,76" fill="none" stroke="#A83810" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Button nose -->
  <circle cx="90" cy="110" r="4" fill="#EDBE92" stroke="#D4A880" stroke-width="1"/>
  <!-- Mouth group (swappable for expressions) -->
  <g data-mouth="true">
    <ellipse cx="90" cy="128" rx="16" ry="12" fill="#C06050"/>
    <ellipse cx="90" cy="124" rx="13" ry="5" fill="white"/>
    <ellipse cx="90" cy="134" rx="8" ry="5" fill="#E07868"/>
  </g>
  <!-- Freckles -->
  <g fill="#C08060" opacity="0.55">
    <circle cx="56" cy="108" r="1.8"/>
    <circle cx="62" cy="112" r="1.5"/>
    <circle cx="52" cy="114" r="1.6"/>
    <circle cx="58" cy="118" r="1.3"/>
    <circle cx="118" cy="108" r="1.8"/>
    <circle cx="124" cy="112" r="1.5"/>
    <circle cx="128" cy="114" r="1.6"/>
    <circle cx="122" cy="118" r="1.3"/>
  </g>
  <!-- Cheek blush -->
  <circle cx="54" cy="114" r="13" fill="url(#bl3)"/>
  <circle cx="126" cy="114" r="13" fill="url(#bl3)"/>
</svg>
