<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Café Creamery – Memory Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SVG Defs (shared gradients, filters, patterns) -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden;">
    <defs>
      <!-- Flavour gradients -->
      <radialGradient id="grad-vanilla" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="var(--vanilla-shine)"/>
        <stop offset="50%" stop-color="var(--vanilla-main)"/>
        <stop offset="100%" stop-color="var(--vanilla-shadow)"/>
      </radialGradient>
      <radialGradient id="grad-chocolate" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="var(--chocolate-shine)"/>
        <stop offset="50%" stop-color="var(--chocolate-main)"/>
        <stop offset="100%" stop-color="var(--chocolate-shadow)"/>
      </radialGradient>
      <radialGradient id="grad-strawberry" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="var(--strawberry-shine)"/>
        <stop offset="50%" stop-color="var(--strawberry-main)"/>
        <stop offset="100%" stop-color="var(--strawberry-shadow)"/>
      </radialGradient>
      <radialGradient id="grad-mint" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="var(--mint-shine)"/>
        <stop offset="50%" stop-color="var(--mint-main)"/>
        <stop offset="100%" stop-color="var(--mint-shadow)"/>
      </radialGradient>

      <!-- Scoop drop shadow -->
      <filter id="scoopShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.2)"/>
      </filter>

      <!-- Shine blur for specular highlight -->
      <filter id="shineBlur">
        <feGaussianBlur stdDeviation="1.5"/>
      </filter>

      <!-- Waffle cone pattern -->
      <pattern id="wafflePattern" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="rgba(139,99,49,0.3)" stroke-width="1"/>
        <line x1="0" y1="0" x2="8" y2="0" stroke="rgba(139,99,49,0.3)" stroke-width="1"/>
      </pattern>

      <!-- Wood grain filter -->
      <filter id="woodGrain" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.15" numOctaves="3" seed="5" result="grain"/>
        <feBlend in="SourceGraphic" in2="grain" mode="soft-light"/>
      </filter>

      <!-- Paper texture filter -->
      <filter id="paperTexture" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="8" result="paper"/>
        <feBlend in="SourceGraphic" in2="paper" mode="multiply"/>
      </filter>

      <!-- Subtle bevel for bottles/tubs -->
      <filter id="subtleBevel" x="-10%" y="-10%" width="120%" height="120%">
        <feSpecularLighting result="specOut" specularExponent="20" lighting-color="#fff">
          <fePointLight x="30" y="10" z="40"/>
        </feSpecularLighting>
        <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="0.15" k4="0"/>
      </filter>

      <!-- Frost filter for display case -->
      <filter id="frostFilter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="2" seed="12" result="frost"/>
        <feBlend in="SourceGraphic" in2="frost" mode="screen"/>
      </filter>
    </defs>
  </svg>

  <!-- Particle overlay canvas -->
  <canvas id="particleCanvas"></canvas>

  <div id="gameRoot">
    <!-- Top bar -->
    <div id="topBar">
      <div id="dayLabel">Day 1</div>
      <div style="flex:1; display:flex; align-items:center; gap:8px;">
        <span id="timer" style="font-size:0.82rem; white-space:nowrap;"></span>
        <div id="timerBarContainer"><div id="timerBar"></div></div>
      </div>
      <div id="moneyLabel">$0</div>
      <div class="top-controls">
        <button id="nextCustomerBtn" class="primary">Start Day 1</button>
        <button id="openShopBtn" disabled>Shop</button>
      </div>
    </div>
    <div id="tutorialBanner">Welcome! Watch the order carefully, then rebuild it.</div>

    <!-- Scene area: customer, speech bubble, built ice cream -->
    <div id="sceneArea">
      <div id="builderArea">
        <div id="orderTabs" class="hidden"></div>
        <div id="builderVisual"></div>
        <button id="submitOrderBtn" class="primary" disabled>Serve!</button>
      </div>
      <div id="speechBubble">
        <div id="customerOrderText">They haven't ordered yet...</div>
        <div id="customerVisual"></div>
      </div>
      <div id="customerArea">
        <div id="customerAvatar"></div>
        <div id="customerName">Shy Customer</div>
        <div id="customerProgress"></div>
      </div>
    </div>

    <!-- Counter shelf: wooden shelf with sauce bottles + containers -->
    <div id="counterShelf"></div>

    <!-- Ingredient tray: glass display case with flavour tubs + toppings + bin -->
    <div id="ingredientTray">
      <div id="flavourTubs"></div>
      <div id="toppingItems"></div>
      <div id="rubbishBin"></div>
    </div>

    <!-- Notepad (floating overlay) -->
    <div id="notepadPanel" class="hidden">
      <div class="notepad-header">
        <strong>Notepad</strong>
        <button class="notepad-color-btn active" data-color="#2c1810" style="background:#2c1810"></button>
        <button class="notepad-color-btn" data-color="#f04747" style="background:#f04747"></button>
        <button class="notepad-color-btn" data-color="#43b581" style="background:#43b581"></button>
        <button class="notepad-color-btn" data-color="eraser" style="background:#fffef6; border-style:dashed;">&#x1f6ab;</button>
        <button class="notepad-color-btn" data-color="clear" style="background:#fff; font-size:0.6rem;">CLR</button>
      </div>
      <canvas id="notepadCanvas"></canvas>
    </div>

    <!-- Result bar -->
    <div id="resultBar">
      <span id="resultText">Serve your first customer to see how you did!</span>
      <div id="endOfDayPanel" class="hidden"></div>
    </div>
  </div>

  <!-- Day-end overlay -->
  <div id="dayEndOverlay">
    <div id="dayEndPanel" class="card">
      <h2 id="dayEndTitle">Day Complete!</h2>
      <div id="dayEndStats"></div>
      <div style="margin-top:10px; text-align:center;">
        <button id="dayEndContinueBtn" class="primary">Continue to Shop</button>
      </div>
    </div>
  </div>

  <!-- Shop overlay (parchment scroll) -->
  <div id="shopOverlay">
    <div id="shopPanel">
      <h2>Evening Upgrades</h2>
      <div id="shopMoney"></div>
      <div id="shopItems"></div>
      <div style="margin-top:12px; text-align:center;">
        <button id="shopCloseBtn">Sleep &amp; Next Day</button>
      </div>
    </div>
  </div>

  <script>
    // ====================================================================
    //  DATA & STATE
    // ====================================================================
    const ALL_FLAVOURS = ["vanilla", "chocolate", "strawberry", "mint"];
    const ALL_TOPPINGS = ["sprinkles", "flake", "caramel", "choc_sauce", "cookie"];

    let unlockedFlavours = new Set(["vanilla", "chocolate"]);
    let unlockedToppings = new Set(["sprinkles"]);
    let hasSecondStation = false;

    let day = 1;
    let money = 0;
    let customersServedToday = 0;

    let currentOrder = null;
    let currentOrders = [];
    let playerOrders = [];
    let activeOrderIndex = 0;
    let playerOrder = { container: null, scoops: [], toppings: new Set() };
    let showPhaseSeconds = 4;
    let dayTimerSeconds = 100;
    let dayTimeLeft = 0;
    let dayTimerId = null;
    let customerBuildStart = null;
    let roundActive = false;
    let inTutorial = true;
    let audioCtx = null;
    let phase = "idle";
    let currentCustomerName = null;
    let hasNotepad = false;
    let dayEarnings = [];

    // ====================================================================
    //  DOM REFS
    // ====================================================================
    const dayLabel = document.getElementById("dayLabel");
    const moneyLabel = document.getElementById("moneyLabel");
    const tutorialBanner = document.getElementById("tutorialBanner");
    const timerEl = document.getElementById("timer");

    const customerNameEl = document.getElementById("customerName");
    const customerOrderTextEl = document.getElementById("customerOrderText");
    const customerVisualEl = document.getElementById("customerVisual");
    const builderVisualEl = document.getElementById("builderVisual");
    const speechBubble = document.getElementById("speechBubble");

    const sceneArea = document.getElementById("sceneArea");
    const counterShelf = document.getElementById("counterShelf");
    const ingredientTray = document.getElementById("ingredientTray");
    const flavourTubs = document.getElementById("flavourTubs");
    const toppingItems = document.getElementById("toppingItems");
    const rubbishBinEl = document.getElementById("rubbishBin");

    const submitOrderBtn = document.getElementById("submitOrderBtn");
    const nextCustomerBtn = document.getElementById("nextCustomerBtn");
    const openShopBtn = document.getElementById("openShopBtn");

    const resultTextEl = document.getElementById("resultText");
    const endOfDayPanelEl = document.getElementById("endOfDayPanel");

    const shopOverlay = document.getElementById("shopOverlay");
    const shopMoneyEl = document.getElementById("shopMoney");
    const shopItemsEl = document.getElementById("shopItems");
    const shopCloseBtn = document.getElementById("shopCloseBtn");
    const timerBarEl = document.getElementById("timerBar");
    const customerProgressEl = document.getElementById("customerProgress");
    const dayEndOverlay = document.getElementById("dayEndOverlay");
    const dayEndTitle = document.getElementById("dayEndTitle");
    const dayEndStats = document.getElementById("dayEndStats");
    const dayEndContinueBtn = document.getElementById("dayEndContinueBtn");

    const SAUCE_TOPPINGS = new Set(["caramel", "choc_sauce"]);

    // ====================================================================
    //  SVG ASSET LOADING SYSTEM
    // ====================================================================
    const ASSET_PATHS = {
      containers: { cone: 'assets/containers/cone.svg', cup: 'assets/containers/cup.svg' },
      scoops: { vanilla: 'assets/scoops/vanilla.svg', chocolate: 'assets/scoops/chocolate.svg',
                strawberry: 'assets/scoops/strawberry.svg', mint: 'assets/scoops/mint-chip.svg' },
      toppings: { sprinkles: 'assets/toppings/sprinkles.svg', flake: 'assets/toppings/chocolate-flake.svg',
                  caramel: 'assets/toppings/caramel-drizzle.svg', choc_sauce: 'assets/toppings/chocolate-sauce.svg',
                  cookie: 'assets/toppings/cookie.svg' },
      characters: { student: 'assets/characters/customer-student.svg', commuter: 'assets/characters/customer-commuter.svg',
                    kid: 'assets/characters/customer-kid.svg', teen: 'assets/characters/customer-teen.svg' },
      ui: { coin: 'assets/ui/coin.svg', faceHappy: 'assets/ui/face-happy.svg',
            faceNeutral: 'assets/ui/face-neutral.svg', faceSad: 'assets/ui/face-sad.svg' }
    };

    const svgCache = {};

    async function preloadSVGAssets() {
      const parser = new DOMParser();
      const allPaths = [];
      for (const category of Object.values(ASSET_PATHS)) {
        for (const path of Object.values(category)) {
          allPaths.push(path);
        }
      }
      await Promise.all(allPaths.map(async (path) => {
        try {
          const resp = await fetch(path);
          const text = await resp.text();
          const doc = parser.parseFromString(text, "image/svg+xml");
          const svg = doc.documentElement;
          svgCache[path] = svg;
        } catch (e) {
          console.warn("Failed to preload SVG:", path, e);
        }
      }));
    }

    function getSVGElement(path) {
      const template = svgCache[path];
      if (!template) return null;
      return template.cloneNode(true);
    }

    // ====================================================================
    //  ASSET-BASED ICE CREAM COMPOSITION
    // ====================================================================

    // Positioning rules from ASSETS.md v2 (units in px at scale=1, base width=140)
    const ICE_CREAM_LAYOUTS = {
      cone: {
        baseW: 140, baseH: 300,
        scoopW: 120, scoopLeft: 10,
        containerTop: { 1: 60, 2: 80 },
        scoopTop: { 1: [15], 2: [0, 40] }
      },
      cup: {
        baseW: 160, baseH: 200,
        scoopW: 120, scoopLeft: 20,
        containerTop: { 1: 55, 2: 65 },
        scoopTop: { 1: [0], 2: [0, 35] }
      }
    };

    function createIceCreamElement(container, scoops, toppingsArr, scale) {
      scale = scale || 1;
      const layout = ICE_CREAM_LAYOUTS[container] || ICE_CREAM_LAYOUTS.cone;
      const numScoops = Math.min(scoops.length, 2);
      const containerTop = layout.containerTop[numScoops] || layout.containerTop[1];
      const scoopTops = layout.scoopTop[numScoops] || layout.scoopTop[1];

      // Calculate total height based on content
      const totalH = container === "cone"
        ? (numScoops === 2 ? 300 : 260)
        : (numScoops === 2 ? 200 : 170);

      const wrapper = document.createElement("div");
      wrapper.className = "ice-cream-asset";
      wrapper.style.position = "relative";
      wrapper.style.width = layout.baseW + "px";
      wrapper.style.height = totalH + "px";
      wrapper.style.display = "inline-block";
      if (scale !== 1) {
        wrapper.style.transform = `scale(${scale})`;
        wrapper.style.transformOrigin = "bottom center";
      }

      // Container (lowest z-index)
      const containerPath = ASSET_PATHS.containers[container];
      if (containerPath) {
        const img = document.createElement("img");
        img.src = containerPath;
        img.style.cssText = `position:absolute; top:${containerTop}px; left:0; width:${layout.baseW}px; z-index:5;`;
        img.draggable = false;
        wrapper.appendChild(img);
      }

      // Scoops (bottom to top, higher z-index for upper scoops)
      scoops.slice(0, 2).forEach((flavour, i) => {
        const scoopPath = ASSET_PATHS.scoops[flavour];
        if (!scoopPath) return;
        // Reverse: index 0 is bottom scoop, last is top
        const stackIndex = numScoops - 1 - i;
        const top = scoopTops[stackIndex] !== undefined ? scoopTops[stackIndex] : scoopTops[0];
        const img = document.createElement("img");
        img.src = scoopPath;
        img.style.cssText = `position:absolute; top:${top}px; left:${layout.scoopLeft}px; width:${layout.scoopW}px; z-index:${10 + i * 5};`;
        img.draggable = false;
        wrapper.appendChild(img);
      });

      // Toppings (highest z-index, positioned on top scoop)
      const topScoopTop = scoopTops[0]; // top scoop is always index 0
      if (toppingsArr && toppingsArr.length > 0) {
        toppingsArr.forEach(t => {
          const toppingPath = ASSET_PATHS.toppings[t];
          if (!toppingPath) return;

          const img = document.createElement("img");
          img.src = toppingPath;
          img.draggable = false;

          if (t === "flake") {
            // Flake sticks up from top-right of scoop, rotated
            img.style.cssText = `position:absolute; top:${topScoopTop - 40}px; left:${layout.scoopLeft + layout.scoopW * 0.6}px; width:26px; z-index:30; transform:rotate(8deg);`;
          } else if (t === "cookie") {
            // Cookie sits centered on top of scoop
            img.style.cssText = `position:absolute; top:${topScoopTop - 10}px; left:${layout.scoopLeft + (layout.scoopW - 50) / 2}px; width:50px; z-index:30;`;
          } else {
            // Drizzle/sprinkle overlays match top scoop position
            img.style.cssText = `position:absolute; top:${topScoopTop - 10}px; left:${layout.scoopLeft - 5}px; width:${layout.scoopW + 10}px; z-index:25;`;
          }
          wrapper.appendChild(img);
        });
      }

      return wrapper;
    }

    // ====================================================================
    //  SVG ICE CREAM RENDERING (Legacy fallback)
    // ====================================================================
    const FLAVOUR_COLORS = {
      vanilla:    { main: "#fff5d6", shadow: "#e8d5a0", shine: "#fffef4" },
      chocolate:  { main: "#7b4a2b", shadow: "#4a2510", shine: "#a06840" },
      strawberry: { main: "#ff8faa", shadow: "#d4607a", shine: "#ffb8cc" },
      mint:       { main: "#8fe8c0", shadow: "#5cb890", shine: "#c0ffd8" }
    };

    function createIceCreamSVG(container, scoops, toppingsArr, scale) {
      scale = scale || 1;
      const w = 90 * scale;
      const scoopH = 32 * scale;
      const scoopW = 50 * scale;
      const containerH = container === "cone" ? 65 * scale : 38 * scale;
      const totalH = containerH + scoops.length * (scoopH * 0.7) + scoopH * 0.4;
      const svgH = totalH + 10 * scale;

      const ns = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("viewBox", `0 0 ${w} ${svgH}`);
      svg.setAttribute("width", w);
      svg.setAttribute("height", svgH);
      svg.classList.add("ice-cream-svg");

      const cx = w / 2;
      const containerBottom = svgH - 4 * scale;
      const containerTop = containerBottom - containerH;

      // Container
      if (container === "cone") {
        // Cone body
        const cone = document.createElementNS(ns, "polygon");
        const coneW = 44 * scale;
        cone.setAttribute("points",
          `${cx - coneW/2},${containerTop} ${cx + coneW/2},${containerTop} ${cx},${containerBottom}`);
        cone.setAttribute("fill", "#e8a84c");
        cone.setAttribute("stroke", "#c4863a");
        cone.setAttribute("stroke-width", "1");
        svg.appendChild(cone);

        // Waffle pattern overlay
        const coneRect = document.createElementNS(ns, "polygon");
        coneRect.setAttribute("points",
          `${cx - coneW/2},${containerTop} ${cx + coneW/2},${containerTop} ${cx},${containerBottom}`);
        coneRect.setAttribute("fill", "url(#wafflePattern)");
        coneRect.setAttribute("opacity", "0.6");
        svg.appendChild(coneRect);

        // Cone edge highlight
        const highlight = document.createElementNS(ns, "line");
        highlight.setAttribute("x1", cx - coneW/2 + 3*scale);
        highlight.setAttribute("y1", containerTop + 2*scale);
        highlight.setAttribute("x2", cx - 1*scale);
        highlight.setAttribute("y2", containerBottom - 3*scale);
        highlight.setAttribute("stroke", "rgba(255,255,255,0.3)");
        highlight.setAttribute("stroke-width", 1.5 * scale);
        highlight.setAttribute("stroke-linecap", "round");
        svg.appendChild(highlight);
      } else {
        // Cup body
        const cupW = 52 * scale;
        const cupTopW = cupW;
        const cupBotW = cupW * 0.75;
        const cup = document.createElementNS(ns, "path");
        const cupR = 8 * scale;
        cup.setAttribute("d",
          `M${cx - cupTopW/2},${containerTop}
           L${cx - cupBotW/2},${containerBottom - cupR}
           Q${cx - cupBotW/2},${containerBottom} ${cx - cupBotW/2 + cupR},${containerBottom}
           L${cx + cupBotW/2 - cupR},${containerBottom}
           Q${cx + cupBotW/2},${containerBottom} ${cx + cupBotW/2},${containerBottom - cupR}
           L${cx + cupTopW/2},${containerTop} Z`);
        cup.setAttribute("fill", "#fafafa");
        cup.setAttribute("stroke", "#ddd");
        cup.setAttribute("stroke-width", "1");
        svg.appendChild(cup);

        // Cup stripe
        const stripe = document.createElementNS(ns, "rect");
        const stripeY = containerTop + containerH * 0.35;
        stripe.setAttribute("x", cx - cupTopW/2 + 4*scale);
        stripe.setAttribute("y", stripeY);
        stripe.setAttribute("width", cupTopW - 8*scale);
        stripe.setAttribute("height", 4*scale);
        stripe.setAttribute("rx", 2*scale);
        stripe.setAttribute("fill", "var(--primary-from)");
        stripe.setAttribute("opacity", "0.4");
        svg.appendChild(stripe);

        // Rim ellipse
        const rim = document.createElementNS(ns, "ellipse");
        rim.setAttribute("cx", cx);
        rim.setAttribute("cy", containerTop);
        rim.setAttribute("rx", cupTopW / 2);
        rim.setAttribute("ry", 4 * scale);
        rim.setAttribute("fill", "#f0f0f0");
        rim.setAttribute("stroke", "#ddd");
        rim.setAttribute("stroke-width", "0.5");
        svg.appendChild(rim);

        // Cup side highlight
        const cupHL = document.createElementNS(ns, "line");
        cupHL.setAttribute("x1", cx - cupTopW/2 + 3*scale);
        cupHL.setAttribute("y1", containerTop + 5*scale);
        cupHL.setAttribute("x2", cx - cupBotW/2 + 3*scale);
        cupHL.setAttribute("y2", containerBottom - 8*scale);
        cupHL.setAttribute("stroke", "rgba(255,255,255,0.6)");
        cupHL.setAttribute("stroke-width", 1.5 * scale);
        cupHL.setAttribute("stroke-linecap", "round");
        svg.appendChild(cupHL);
      }

      // Scoops (bottom to top)
      scoops.forEach((flavour, index) => {
        const c = FLAVOUR_COLORS[flavour] || FLAVOUR_COLORS.vanilla;
        const scoopY = containerTop - index * (scoopH * 0.7);
        const scoopCY = scoopY - scoopH * 0.3;

        const g = document.createElementNS(ns, "g");
        g.setAttribute("filter", "url(#scoopShadow)");

        // Bottom bulge
        const bulge = document.createElementNS(ns, "ellipse");
        bulge.setAttribute("cx", cx);
        bulge.setAttribute("cy", scoopY + 2*scale);
        bulge.setAttribute("rx", scoopW * 0.42);
        bulge.setAttribute("ry", scoopH * 0.25);
        bulge.setAttribute("fill", c.shadow);
        g.appendChild(bulge);

        // Main scoop body
        const body = document.createElementNS(ns, "ellipse");
        body.setAttribute("cx", cx);
        body.setAttribute("cy", scoopCY);
        body.setAttribute("rx", scoopW / 2);
        body.setAttribute("ry", scoopH / 2);
        body.setAttribute("fill", `url(#grad-${flavour})`);
        g.appendChild(body);

        // Specular shine
        const shine = document.createElementNS(ns, "ellipse");
        shine.setAttribute("cx", cx - scoopW * 0.15);
        shine.setAttribute("cy", scoopCY - scoopH * 0.15);
        shine.setAttribute("rx", scoopW * 0.18);
        shine.setAttribute("ry", scoopH * 0.15);
        shine.setAttribute("fill", c.shine);
        shine.setAttribute("opacity", "0.5");
        shine.setAttribute("filter", "url(#shineBlur)");
        g.appendChild(shine);

        // Mint chip details
        if (flavour === "mint") {
          const chipPositions = [
            { dx: -0.2, dy: 0.05 }, { dx: 0.15, dy: -0.1 }, { dx: 0.05, dy: 0.15 }
          ];
          chipPositions.forEach(p => {
            const chip = document.createElementNS(ns, "ellipse");
            chip.setAttribute("cx", cx + scoopW * p.dx);
            chip.setAttribute("cy", scoopCY + scoopH * p.dy);
            chip.setAttribute("rx", 2.5 * scale);
            chip.setAttribute("ry", 2 * scale);
            chip.setAttribute("fill", "#4a2510");
            chip.setAttribute("opacity", "0.7");
            g.appendChild(chip);
          });
        }

        svg.appendChild(g);

        // Toppings on top scoop only
        if (index === scoops.length - 1) {
          const topY = scoopCY;
          if (toppingsArr.includes("sprinkles")) {
            appendSprinklesSVG(svg, cx, topY, scoopW, scale);
          }
          if (toppingsArr.includes("flake")) {
            appendFlakeSVG(svg, cx, topY, scale);
          }
          if (toppingsArr.includes("caramel")) {
            appendDrizzleSVG(svg, cx, topY, scoopW, "#DAA520", scale);
          }
          if (toppingsArr.includes("choc_sauce")) {
            appendDrizzleSVG(svg, cx, topY - 3*scale, scoopW, "#3B1E08", scale);
          }
        }
      });

      return svg;
    }

    function appendSprinklesSVG(svg, cx, cy, scoopW, scale) {
      const ns = "http://www.w3.org/2000/svg";
      const colors = ["#ff5f7e", "#4ea6ff", "#ffe040", "#43b581", "#ff8bb0", "#7ad6ff"];
      const positions = [

    // ====================================================================

    // ====================================================================
    const particleCanvas = document.getElementById("particleCanvas");
    const pCtx = particleCanvas.getContext("2d");
    let particles = [];
    let particleRAF = null;

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }
    resizeParticleCanvas();
    window.addEventListener("resize", resizeParticleCanvas);

    class Particle {
      constructor(x, y, vx, vy, color, size, life, shape, gravity) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.color = color; this.size = size;
        this.life = life; this.maxLife = life;
        this.shape = shape || "circle";
        this.gravity = gravity || 0;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.life--;
        this.rotation += this.rotSpeed;
      }

      draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;

        if (this.shape === "circle") {
          ctx.beginPath();
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
          ctx.fill();
        } else if (this.shape === "rect") {
          ctx.fillRect(-this.size, -this.size / 2, this.size * 2, this.size);
        } else if (this.shape === "star") {
          drawStar(ctx, 0, 0, 5, this.size, this.size / 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
      ctx.beginPath();
      let rot = -Math.PI / 2;
      for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
        rot += Math.PI / spikes;
        ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
        rot += Math.PI / spikes;
      }
      ctx.closePath();
    }

    function animateParticles() {
      pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.update();
        p.draw(pCtx);
      });
      if (particles.length > 0) {
        particleRAF = requestAnimationFrame(animateParticles);
      } else {
        particleRAF = null;
      }
    }

    function startParticles() {
      if (!particleRAF) {
        particleRAF = requestAnimationFrame(animateParticles);
      }
    }

    function scoopPlaceEffect(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const angle = (Math.PI * 2 * i) / 8;
        const speed = 1.5 + Math.random() * 2;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed, Math.sin(angle) * speed,
          color, 3 + Math.random() * 2, 20 + Math.random() * 10, "circle", 0
        ));
      }
      startParticles();
    }

    function celebratePerfect(x, y) {
      const colors = ["#ff5f7e", "#4ea6ff", "#ffe040", "#43b581", "#ff8bb0", "#ffd966", "#7ad6ff", "#ff758c"];
      for (let i = 0; i < 45; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        const shape = Math.random() > 0.5 ? "rect" : "circle";
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed, Math.sin(angle) * speed - 3,
          colors[Math.floor(Math.random() * colors.length)],
          2 + Math.random() * 4, 40 + Math.random() * 30, shape, 0.12
        ));
      }
      startParticles();
    }

    function sparkleMoney(x, y) {
      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI/2 + (Math.random() - 0.5) * 1.2;
        const speed = 1 + Math.random() * 2;
        particles.push(new Particle(
          x, y,
          Math.cos(angle) * speed, Math.sin(angle) * speed - 1,
          Math.random() > 0.5 ? "#ffd966" : "#f5b731",
          2 + Math.random() * 3, 25 + Math.random() * 15, "star", -0.02
        ));
      }
      startParticles();
    }

    // ====================================================================
    //  AUDIO (Phase 5d)
    // ====================================================================
    function ensureAudioCtx() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
      }
      return audioCtx;
    }

    function playSound(type) {
      try {
        const ctx = ensureAudioCtx();
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        const now = ctx.currentTime;

        if (type === "ding") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(880, now);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.25, now + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          osc.start(); osc.stop(now + 0.4);
        } else if (type === "pickup") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.linearRampToValueAtTime(800, now + 0.1);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          osc.start(); osc.stop(now + 0.15);
        } else if (type === "drop") {
          osc.type = "sine";
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.linearRampToValueAtTime(280, now + 0.2);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          osc.start(); osc.stop(now + 0.3);
        } else if (type === "invalid") {
          osc.type = "square";
          osc.frequency.setValueAtTime(200, now);
          gain.gain.setValueAtTime(0.001, now);
          gain.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
          osc.start(); osc.stop(now + 0.2);
        }
      } catch (e) {}
    }

    // ====================================================================
    //  INGREDIENT / BUILDER STEPS
    // ====================================================================
    function setBuilderEnabled(enabled) {
      counterShelf.querySelectorAll(".counter-item").forEach(b => b.disabled = !enabled);
      ingredientTray.querySelectorAll(".tray-item").forEach(b => b.disabled = !enabled);
      if (!enabled) submitOrderBtn.disabled = true;
      updateBuilderSteps();
    }

    function updateBuilderSteps() {
      const hasContainer = !!playerOrder.container;
      const hasScoops = playerOrder.scoops.length > 0;
      const maxScoops = playerOrder.scoops.length >= 3;

      // Flavour tubs: need container first
      flavourTubs.querySelectorAll(".tray-item").forEach(b => {
        b.disabled = !hasContainer || maxScoops;
      });

      // Toppings in tray: need at least one scoop
      toppingItems.querySelectorAll(".tray-item").forEach(b => {
        b.disabled = !hasScoops;
      });

      // Sauce bottles on counter: need at least one scoop
      counterShelf.querySelectorAll('.counter-item[data-type="topping"]').forEach(b => {
        b.disabled = !hasScoops;
      });
    }

    function addIngredient(type, value) {
      // Auto-dismiss dialogue on first ingredient add
      if (phase === "dialogue") {
        phase = "build";
        roundActive = true;
        customerBuildStart = Date.now();
        setBuilderEnabled(true);
        speechBubble.classList.add("fading");
        setTimeout(() => {
          speechBubble.classList.add("hidden");
          customerVisualEl.innerHTML = "";
        }, 400);
        if (day === 1 && customersServedToday === 0) {
          setTutorialMessage("Now rebuild the ice cream from memory. Drag or tap ingredients!");
        } else {
          setTutorialMessage("Rebuild the order before the timer runs out.");
        }
        renderOrderTabs();
      }

      if (phase !== "build" || !roundActive) return false;

      if (type === "container") {
        playerOrder.container = value;
        playSound("drop");
        const rect = builderVisualEl.getBoundingClientRect();
        scoopPlaceEffect(rect.left + rect.width/2, rect.top + rect.height * 0.7,
          value === "cone" ? "#e8a84c" : "#ddd");
      } else if (type === "flavour") {
        if (!playerOrder.container) { playSound("invalid"); return false; }
        if (playerOrder.scoops.length >= 3) { playSound("invalid"); return false; }
        playerOrder.scoops.push(value);
        playSound("drop");
        const c = FLAVOUR_COLORS[value] || FLAVOUR_COLORS.vanilla;
        const rect = builderVisualEl.getBoundingClientRect();
        scoopPlaceEffect(rect.left + rect.width/2, rect.top + rect.height * 0.4, c.main);
      } else if (type === "topping") {
        if (playerOrder.scoops.length === 0) { playSound("invalid"); return false; }
        if (playerOrder.toppings.has(value)) {
          playerOrder.toppings.delete(value);
        } else {
          playerOrder.toppings.add(value);
          playSound("drop");
        }
      }

      refreshSelectionStates();
      updateBuilderSteps();
      maybeEnableServe();
      renderBuilderVisual();
      renderOrderTabs();
      return true;
    }

    // ====================================================================
    //  COUNTER / TRAY RENDERING
    // ====================================================================
    function refreshCounterShelf() {
      counterShelf.innerHTML = "";

      // Containers: standing cone, cup stack
      ["cone", "cup"].forEach(val => {
        const tile = document.createElement("div");
        tile.className = "counter-item";
        tile.dataset.type = "container";
        tile.dataset.value = val;
        tile.appendChild(val === "cone" ? createStandingConeSVG() : createCupStackSVG());
        const label = document.createElement("span");
        label.className = "tile-label";
        label.textContent = val === "cone" ? "Cone" : "Cup";
        tile.appendChild(label);
        tile.addEventListener("pointerdown", handlePointerDown);
        counterShelf.appendChild(tile);
      });

      // Sauce toppings go on the counter shelf as bottles
      allUnlockedToppings().filter(t => SAUCE_TOPPINGS.has(t)).forEach(t => {
        const tile = document.createElement("div");
        tile.className = "counter-item";
        tile.dataset.type = "topping";
        tile.dataset.value = t;
        tile.appendChild(createSauceBottleSVG(t));
        const label = document.createElement("span");
        label.className = "tile-label";
        label.textContent = t === "caramel" ? "Caramel" : "Choc";
        tile.appendChild(label);
        tile.addEventListener("pointerdown", handlePointerDown);
        counterShelf.appendChild(tile);
      });
    }

    function refreshIngredientTray() {
      flavourTubs.innerHTML = "";
      toppingItems.innerHTML = "";

      // Flavour tubs
      allUnlockedFlavours().forEach(f => {
        const tile = document.createElement("div");
        tile.className = "tray-item";
        tile.dataset.type = "flavour";
        tile.dataset.value = f;
        tile.appendChild(createFlavourTubSVG(f));
        const label = document.createElement("span");
        label.className = "tile-label";
        label.textContent = labelForFlavour(f);
        tile.appendChild(label);
        tile.addEventListener("pointerdown", handlePointerDown);
        flavourTubs.appendChild(tile);
      });

      // Non-sauce toppings in tray
      allUnlockedToppings().filter(t => !SAUCE_TOPPINGS.has(t)).forEach(t => {
        const tile = document.createElement("div");

        tile.dataset.type = "topping";
        tile.dataset.value = t;
        if (t === "sprinkles") {

        } else if (t === "flake") {

        }

    function refreshSelectionStates() {
      // Container items on counter
      counterShelf.querySelectorAll('.counter-item[data-type="container"]').forEach(tile => {
        tile.classList.toggle("selected", tile.dataset.value === playerOrder.container);
      });

      // Flavour tubs
      flavourTubs.querySelectorAll(".tray-item").forEach(tile => {
        const count = playerOrder.scoops.filter(s => s === tile.dataset.value).length;
        tile.classList.toggle("selected", count > 0);
      });

      // Topping items (tray + counter sauces)
      toppingItems.querySelectorAll(".tray-item").forEach(tile => {
        tile.classList.toggle("selected", playerOrder.toppings.has(tile.dataset.value));
      });
      counterShelf.querySelectorAll('.counter-item[data-type="topping"]').forEach(tile => {
        tile.classList.toggle("selected", playerOrder.toppings.has(tile.dataset.value));
      });
    }

    // ====================================================================
    //  DRAG-AND-DROP SYSTEM (Phase 4)
    // ====================================================================
    const DragManager = {
      active: false,
      ghostEl: null,
      sourceEl: null,
      dragType: null,
      dragValue: null,
      startX: 0, startY: 0,
      isDragging: false,
      dragThreshold: 8,
      pointerId: null
    };

    function handlePointerDown(e) {
      const tile = e.target.closest(".counter-item, .tray-item");
      if (!tile || tile.disabled) return;

      e.preventDefault();
      tile.setPointerCapture(e.pointerId);

      DragManager.active = true;
      DragManager.isDragging = false;
      DragManager.sourceEl = tile;
      DragManager.dragType = tile.dataset.type;
      DragManager.dragValue = tile.dataset.value;
      DragManager.startX = e.clientX;
      DragManager.startY = e.clientY;
      DragManager.pointerId = e.pointerId;

      tile.addEventListener("pointermove", handlePointerMove);
      tile.addEventListener("pointerup", handlePointerUp);
      tile.addEventListener("pointercancel", handlePointerUp);
    }

    function handlePointerMove(e) {
      if (!DragManager.active) return;
      e.preventDefault();

      const dx = e.clientX - DragManager.startX;
      const dy = e.clientY - DragManager.startY;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (!DragManager.isDragging && dist > DragManager.dragThreshold) {
        DragManager.isDragging = true;
        document.body.style.touchAction = "none";
        playSound("pickup");

        // Create ghost from source SVG
        const ghost = document.createElement("div");
        ghost.className = "drag-ghost";
        const svgEl = DragManager.sourceEl.querySelector("svg");
        if (svgEl) ghost.appendChild(svgEl.cloneNode(true));
        document.body.appendChild(ghost);
        DragManager.ghostEl = ghost;
      }

      if (DragManager.isDragging && DragManager.ghostEl) {
        const ghost = DragManager.ghostEl;
        ghost.style.left = (e.clientX - 36) + "px";
        ghost.style.top = (e.clientY - 38) + "px";

        const tilt = Math.max(-15, Math.min(15, dx * 0.3));
        ghost.style.transform = `rotate(${tilt}deg)`;

        // Hit-test
        ghost.style.display = "none";
        const elBelow = document.elementFromPoint(e.clientX, e.clientY);
        ghost.style.display = "";

        const overScene = elBelow && (
          elBelow.id === "sceneArea" || elBelow.closest("#sceneArea") ||
          elBelow.id === "builderArea" || elBelow.closest("#builderArea") ||
          elBelow.id === "builderVisual" || elBelow.closest("#builderVisual")
        );

        const overBin = elBelow && (
          elBelow.id === "rubbishBin" || elBelow.closest("#rubbishBin")
        );

        // Bin hover state
        rubbishBinEl.classList.toggle("drag-hover", !!overBin);
        if (overBin) {
          rubbishBinEl.innerHTML = "";
          rubbishBinEl.appendChild(createRubbishBinSVG(true));
        } else {
          if (rubbishBinEl.querySelector("svg")) {
            rubbishBinEl.innerHTML = "";
            rubbishBinEl.appendChild(createRubbishBinSVG(false));
          }
        }

        ghost.classList.toggle("over-valid", !!overScene && canDrop(DragManager.dragType, DragManager.dragValue));
        ghost.classList.toggle("over-bin", !!overBin);
      }
    }

    function handlePointerUp(e) {
      if (!DragManager.active) return;

      const tile = DragManager.sourceEl;
      tile.removeEventListener("pointermove", handlePointerMove);
      tile.removeEventListener("pointerup", handlePointerUp);
      tile.removeEventListener("pointercancel", handlePointerUp);

      rubbishBinEl.classList.remove("drag-hover");
      rubbishBinEl.innerHTML = "";
      rubbishBinEl.appendChild(createRubbishBinSVG(false));
      document.body.style.touchAction = "";

      if (!DragManager.isDragging) {
        // Tap: add ingredient directly
        addIngredient(DragManager.dragType, DragManager.dragValue);
      } else if (DragManager.ghostEl) {
        const ghost = DragManager.ghostEl;
        ghost.style.display = "none";
        const elBelow = document.elementFromPoint(e.clientX, e.clientY);
        ghost.style.display = "";

        const overBin = elBelow && (
          elBelow.id === "rubbishBin" || elBelow.closest("#rubbishBin")
        );

        const overScene = elBelow && (
          elBelow.id === "sceneArea" || elBelow.closest("#sceneArea") ||
          elBelow.id === "builderArea" || elBelow.closest("#builderArea") ||
          elBelow.id === "builderVisual" || elBelow.closest("#builderVisual")
        );

        if (overBin) {
          // Drag over bin cancels - shrink ghost
          ghost.style.transition = "transform 0.15s ease-out, opacity 0.15s ease-out";
          ghost.style.transform = "scale(0.2)";
          ghost.style.opacity = "0";
          setTimeout(() => ghost.remove(), 160);
          playSound("invalid");
        } else if (overScene && canDrop(DragManager.dragType, DragManager.dragValue)) {
          // Successful drop
          ghost.style.transition = "transform 0.15s ease-out, opacity 0.15s ease-out";
          ghost.style.transform = "scale(0.3)";
          ghost.style.opacity = "0";
          setTimeout(() => ghost.remove(), 160);
          addIngredient(DragManager.dragType, DragManager.dragValue);
        } else {
          // Fly-back animation
          const sourceRect = DragManager.sourceEl.getBoundingClientRect();
          ghost.style.transition = "left 0.2s ease-out, top 0.2s ease-out, opacity 0.2s ease-out";
          ghost.style.left = (sourceRect.left) + "px";
          ghost.style.top = (sourceRect.top) + "px";
          ghost.style.opacity = "0";
          setTimeout(() => ghost.remove(), 220);
          if (!canDrop(DragManager.dragType, DragManager.dragValue)) {
            playSound("invalid");
          }
        }
      }

      DragManager.active = false;
      DragManager.isDragging = false;
      DragManager.ghostEl = null;
      DragManager.sourceEl = null;
    }

    function canDrop(type, value) {
      if (phase !== "build" && phase !== "dialogue") return false;
      if (!roundActive && phase !== "dialogue") return false;
      if (type === "container") return true;
      if (type === "flavour") return !!playerOrder.container && playerOrder.scoops.length < 3;
      if (type === "topping") return playerOrder.scoops.length > 0;
      return false;
    }

    // ====================================================================
    //  LABEL HELPERS
    // ====================================================================
    const flavourColors = {
      vanilla: "#f0e0ac", chocolate: "#6c3c19",
      strawberry: "#ff8bb0", mint: "#96d6b3"
    };

    function labelForFlavour(f) {
      switch (f) {
        case "vanilla": return "Vanilla";
        case "chocolate": return "Chocolate";
        case "strawberry": return "Strawberry";
        case "mint": return "Mint Chip";
        default: return f;
      }
    }

    function labelForTopping(t) {
      switch (t) {
        case "sprinkles": return "Rainbow Sprinkles";
        case "flake": return "Chocolate Flake";
        case "caramel": return "Caramel Drizzle";
        case "choc_sauce": return "Chocolate Sauce";
        case "cookie": return "Cookie";
        default: return t;
      }
    }

    function primaryFlavour(order) {
      if (!order.scoops || !order.scoops.length) return null;
      const counts = {};
      order.scoops.forEach(f => { counts[f] = (counts[f] || 0) + 1; });
      return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
    }

    function flavourVibe(flavour) {
      switch (flavour) {
        case "chocolate": return "something chocolatey";
        case "vanilla": return "something creamy";
        case "strawberry": return "something strawberry-ish";
        case "mint": return "something minty";
        default: return "something tasty";
      }
    }

    function toppingPhrase(t) {
      switch (t) {
        case "sprinkles": return "some sprinkles";
        case "flake": return "a flake";
        case "caramel": return "caramel sauce";
        case "choc_sauce": return "chocolate sauce";
        case "cookie": return "a cookie";
        default: return t;
      }
    }

    function scoopPhrase(n) {
      if (n === 1) return "one scoop";
      if (n === 2) return "two scoops";
      if (n === 3) return "three scoops";
      return `${n} scoops`;
    }

    // ====================================================================
    //  DIALOGUE GENERATION
    // ====================================================================
    function generateSingleOrderDialogue(order) {
      const counts = {};
      order.scoops.forEach(f => { counts[f] = (counts[f] || 0) + 1; });
      const scoopParts = Object.entries(counts).map(([f, c]) => {
        return `${c === 1 ? "one" : c} ${labelForFlavour(f)}`;
      });

      const toppingsText = order.toppings.length
        ? [...order.toppings.map(toppingPhrase)]
        : [];

      let desc = `${scoopParts.join(" and ")}`;
      desc += order.container === "cone" ? " on a cone" : " in a cup";

      if (toppingsText.length) {
        if (toppingsText.length === 1) {
          desc += " with " + toppingsText[0];
        } else {
          const last = toppingsText.pop();
          desc += " with " + toppingsText.join(", ") + " and " + last;
        }
      }
      return desc;
    }

    function generateDialogue(orders, customerLabel) {
      const lines = [];
      const name = customerLabel || "";
      const order = orders[0];
      const mainFlavour = primaryFlavour(order) || "vanilla";
      const vibe = flavourVibe(mainFlavour);

      if (orders.length > 1) {
        const countWord = orders.length === 2 ? "two" : "three";
        if (name.includes("Sunny Tourist")) {
          lines.push(`Hiya! I'd like ${countWord} ice creams today!`);
        } else if (name.includes("Hurry-Up Commuter")) {
          lines.push(`Quick, ${countWord} ice creams.`);
        } else {
          lines.push(`Hi! Can I get ${countWord} ice creams?`);
        }

        orders.forEach((o, i) => {
          const ordinal = i === 0 ? "First" : i === 1 ? "Second" : "Third";
          lines.push(`${ordinal}: ${generateSingleOrderDialogue(o)}.`);
        });
      } else {
        const counts = {};
        order.scoops.forEach(f => { counts[f] = (counts[f] || 0) + 1; });
        const scoopParts = Object.entries(counts).map(([f, c]) => {
          return `${c === 1 ? "one" : c} ${labelForFlavour(f)}`;
        });

        const toppingsText = order.toppings.length
          ? [...order.toppings.map(toppingPhrase)]
          : [];

        if (name.includes("Sunny Tourist")) {
          lines.push("Hiya! I'm in the mood for " + vibe + ".");
          lines.push(`Maybe ${scoopPhrase(order.scoops.length)}\u2026 like ${scoopParts.join(" and ")}?`);
        } else if (name.includes("Hurry-Up Commuter")) {
          lines.push("Quick order please.");
          lines.push(`${scoopPhrase(order.scoops.length)}: ${scoopParts.join(", ")}.`);
        } else if (name.includes("Local Kid")) {
          lines.push("Um, can I get " + scoopParts.join(" and ") + "?");
        } else if (name.includes("Sleepy Student")) {
          lines.push("Hey\u2026 I need " + vibe + " to wake up.");
          lines.push(`${scoopPhrase(order.scoops.length)} of ${scoopParts.join(" and ")}.`);
        } else {
          lines.push("Hi! I'd like " + scoopParts.join(" and ") + ", please.");
        }

        if (order.container === "cone") {
          lines.push("On a cone.");
        } else {
          lines.push("In a cup.");
        }

        if (toppingsText.length) {
          if (toppingsText.length === 1) {
            lines.push("Add " + toppingsText[0] + ".");
          } else {
            const last = toppingsText.pop();
            lines.push("Add " + toppingsText.join(", ") + " and " + last + ".");
          }
        } else {
          if (Math.random() < 0.5) {
            lines.push("No toppings today.");
          }
        }

        const unlocked = allUnlockedToppings();
        const excludedOptions = unlocked.filter(t => !order.toppings.includes(t));
        if (excludedOptions.length && Math.random() < 0.6) {
          const noTopping = excludedOptions[Math.floor(Math.random() * excludedOptions.length)];
          lines.push("And definitely no " + toppingPhrase(noTopping) + ".");
        }
      }

      if (name.includes("Hurry-Up Commuter")) {
        lines.push("Thanks, I'm in a rush.");
      } else if (name.includes("Sunny Tourist")) {
        lines.push("Thank you!");
      } else if (name.includes("Local Kid")) {
        lines.push("Thank you!");
      } else {
        lines.push("That's all, thanks.");
      }

      return lines.join(" ");
    }

    // ====================================================================
    //  GAME FLOW
    // ====================================================================
    function resetPlayerOrder() {
      playerOrder = { container: null, scoops: [], toppings: new Set() };
      activeOrderIndex = 0;
      playerOrders = [playerOrder];
      currentOrders = [];
      refreshSelectionStates();
      submitOrderBtn.disabled = true;
      renderBuilderVisual();
      const tabsEl = document.getElementById("orderTabs");
      if (tabsEl) { tabsEl.classList.add("hidden"); tabsEl.innerHTML = ""; }
      updateBuilderSteps();
    }

    function allUnlockedFlavours() {
      return Array.from(unlockedFlavours);
    }
    function allUnlockedToppings() {
      return Array.from(unlockedToppings);
    }

    function randomOrder() {
      const container = Math.random() < 0.5 ? "cone" : "cup";
      const flavours = allUnlockedFlavours();
      const availableToppings = allUnlockedToppings();

      let minScoops, forceMixed, minToppings;
      if (day <= 2) {
        minScoops = 1; forceMixed = false; minToppings = 0;
      } else if (day <= 4) {
        minScoops = 1; forceMixed = true; minToppings = 0;
      } else if (day <= 6) {
        minScoops = 2; forceMixed = true; minToppings = 1;
      } else {
        minScoops = 2; forceMixed = true; minToppings = 1;
      }

      let totalScoops = minScoops + Math.floor(Math.random() * (4 - minScoops));
      totalScoops = Math.min(totalScoops, 3);
      if (day >= 7 && flavours.length >= 3) totalScoops = 3;

      const scoops = [];
      if (!forceMixed && Math.random() < 0.6) {
        const f = flavours[Math.floor(Math.random() * flavours.length)];
        for (let i = 0; i < totalScoops; i++) scoops.push(f);
      } else if (forceMixed && totalScoops >= 2 && flavours.length >= 2) {
        const shuffled = [...flavours].sort(() => Math.random() - 0.5);
        scoops.push(shuffled[0], shuffled[1]);
        for (let i = 2; i < totalScoops; i++) {
          scoops.push(flavours[Math.floor(Math.random() * flavours.length)]);
        }
      } else {
        for (let i = 0; i < totalScoops; i++) {
          scoops.push(flavours[Math.floor(Math.random() * flavours.length)]);
        }
      }

      const maxToppings = Math.min(3, availableToppings.length);
      let count = (maxToppings === 0) ? 0 : Math.floor(Math.random() * (maxToppings + 1));
      count = Math.max(count, Math.min(minToppings, availableToppings.length));
      const shuffled = [...availableToppings].sort(() => Math.random() - 0.5);
      const toppings = shuffled.slice(0, count);

      return { container, scoops, toppings };
    }

    function getOrderCount() {
      if (!hasSecondStation || day < 5) return 1;
      const r = Math.random();
      if (day >= 8) {
        if (r < 0.4) return 2;
        if (r < 0.6) return 3;
        return 1;
      }
      return r < 0.4 ? 2 : 1;
    }

    function generateCustomerOrders() {
      const count = getOrderCount();
      const orders = [];
      for (let i = 0; i < count; i++) {
        orders.push(randomOrder());
      }
      return orders;
    }

    function describeOrder(order) {
      const parts = [];
      parts.push(order.container === "cone" ? "Cone" : "Cup");

      const counts = {};
      order.scoops.forEach(f => { counts[f] = (counts[f] || 0) + 1; });
      const scoopPhrases = Object.entries(counts).map(([f, c]) => {
        return `${c}x ${labelForFlavour(f)}`;
      });

      const scoopWord = order.scoops.length === 1 ? "1 scoop" : `${order.scoops.length} scoops`;
      parts.push(`${scoopWord}: ${scoopPhrases.join(", ")}`);

      if (order.toppings.length) {
        parts.push("with " + order.toppings.map(labelForTopping).join(", "));
      } else {
        parts.push("with no toppings");
      }
      return parts.join(", ");
    }

    function updateTimerDisplay() {

                    : pct > 30 ? ASSET_PATHS.ui.faceNeutral
                    : ASSET_PATHS.ui.faceSad;

    function startCustomerRound() {
      if (phase !== "idle") return;

      resetPlayerOrder();
      resultTextEl.textContent = "Watch the order carefully\u2026";
      phase = "dialogue";
      roundActive = false;

      // Show speech bubble with order
      speechBubble.classList.remove("fading", "hidden");
      customerOrderTextEl.style.opacity = "1";

      currentOrders = generateCustomerOrders();
      currentOrder = currentOrders[0];
      activeOrderIndex = 0;
      playerOrders = currentOrders.map(() => ({
        container: null, scoops: [], toppings: new Set()
      }));
      playerOrder = playerOrders[0];
      currentCustomerName = randomCustomerName();
      customerNameEl.textContent = currentCustomerName;

      // New character seed for each customer
      currentCustomerSeed = day * 100 + customersServedToday + Date.now() % 1000;
      renderCharacterAvatar("happy");

      // Typewriter effect — no "Okay" button, auto-dismiss on first ingredient
      const dialogue = generateDialogue(currentOrders, currentCustomerName);
      typewriterEffect(customerOrderTextEl, dialogue, 20, () => {
        // Dialogue finished — builder is already enabled for auto-dismiss
      });

      // Show customer visual during dialogue
      renderCustomerVisual();

      // Enable builder so player can start adding ingredients immediately
      setBuilderEnabled(true);
      playSound("ding");
      updateCustomerProgress();

      if (hasNotepad) {
        showNotepad();
        clearNotepad();
      }

      if (day === 1 && customersServedToday === 0) {
        setTutorialMessage("Read the order, then tap an ingredient to start building!");
      }

      if (customersServedToday === 0 && !dayTimerId) {
        startDayTimer();
      }

      updateTimerDisplay();
      submitOrderBtn.disabled = true;
    }

    function startDayTimer() {
      clearInterval(dayTimerId);
      dayTimerId = setInterval(() => {
        dayTimeLeft--;
        updateTimerDisplay();
        const pct = (dayTimeLeft / dayTimerSeconds) * 100;
        timerBarEl.style.width = pct + "%";
        if (pct <= 15) {
          timerBarEl.className = "danger";
        } else if (pct <= 33) {
          timerBarEl.className = "warning";
        } else {
          timerBarEl.className = "";
        }

        // Customer patience
        if (phase === "build" && customerBuildStart) {
          const elapsed = (Date.now() - customerBuildStart) / 1000;
          if (elapsed > 15) {
            renderCharacterAvatar("impatient");
          } else if (elapsed >= 8) {
            renderCharacterAvatar("neutral");
          }
        }

        if (dayTimeLeft <= 0) {
          endDayFromTimer();
        }
      }, 1000);
    }

    function endDayFromTimer() {
      clearInterval(dayTimerId);
      dayTimerId = null;
      timerEl.textContent = "Day over!";
      timerBarEl.style.width = "0%";
      timerBarEl.className = "";

      if (roundActive) {
        evaluateOrder(true);
      } else if (phase === "dialogue") {
        phase = "idle";
        speechBubble.classList.add("hidden");
        endDaySummary();
      } else {
        endDaySummary();
      }
    }

    function renderOrderTabs() {

      if (currentOrders.length <= 1) {
        tabsEl.classList.add("hidden");

      tabsEl.style.display = "flex";

        tab.className = "order-tab" + (i === activeOrderIndex ? " active" : "");

    function switchToOrder(index) {
      if (index === activeOrderIndex) return;
      playerOrders[activeOrderIndex] = { ...playerOrder, toppings: new Set(playerOrder.toppings) };
      activeOrderIndex = index;
      playerOrder = playerOrders[activeOrderIndex];
      currentOrder = currentOrders[activeOrderIndex];
      refreshSelectionStates();
      updateBuilderSteps();
      renderBuilderVisual();
      renderOrderTabs();
      maybeEnableServe();
      updateStation2Preview();

      // Station panels removed in scene layout — no-op
    }

      // Station panels removed in scene layout — no-op
    }

    function maybeEnableServe() {
      if (!roundActive) return;
      playerOrders[activeOrderIndex] = { ...playerOrder, toppings: new Set(playerOrder.toppings) };
      const allReady = playerOrders.every(po => po.container && po.scoops && po.scoops.length > 0);
      submitOrderBtn.disabled = !allReady;
    }

    function randomCustomerName() {
      const names = [
        "Sunny Tourist", "Local Kid", "Sleepy Student", "Curious Critic",
        "Hurry-Up Commuter", "Ice Cream Expert", "Birthday Guest"
      ];
      return names[Math.floor(Math.random() * names.length)];
    }

    function scoreOneOrder(trueOrder, builtOrder) {
      let scoreParts = 0;
      const totalParts = 3;
      if (builtOrder.container === trueOrder.container) scoreParts++;
      const trueScoops = trueOrder.scoops || [];
      const playerScoops = builtOrder.scoops || [];
      const scoopMatch =
        trueScoops.length === playerScoops.length &&
        [...trueScoops].sort().join("|") === [...playerScoops].sort().join("|");
      if (scoopMatch) scoreParts++;
      const trueToppings = new Set(trueOrder.toppings);
      const playerToppings = builtOrder.toppings;
      const toppingsMatch =
        trueToppings.size === playerToppings.size &&
        [...trueToppings].every(t => playerToppings.has(t));
      if (toppingsMatch) scoreParts++;
      return { scoreParts, totalParts, scoopMatch, toppingsMatch };
    }

    function evaluateOrder(timeUp = false) {
      if (!roundActive) return;
      roundActive = false;
      phase = "idle";
      submitOrderBtn.disabled = true;

      // Reset avatar
      renderCharacterAvatar("happy");

      playerOrders[activeOrderIndex] = { ...playerOrder, toppings: new Set(playerOrder.toppings) };

      const numOrders = currentOrders.length;
      let totalScore = 0;
      let totalMaxParts = 0;
      const perOrderResults = [];

      for (let i = 0; i < numOrders; i++) {
        const result = scoreOneOrder(currentOrders[i], playerOrders[i]);
        totalScore += result.scoreParts;
        totalMaxParts += result.totalParts;
        perOrderResults.push(result);
      }

      const accuracy = totalMaxParts > 0 ? totalScore / totalMaxParts : 0;
      const baseEarnings = numOrders === 1 ? 12 : numOrders === 2 ? 20 : 28;
      let earnings = Math.round(accuracy * baseEarnings);

      let refund = 0;
      if (totalScore === 0) {
        refund = 8;
        earnings -= refund;
      }

      let tip = 0;
      if (!timeUp && totalScore === totalMaxParts && customerBuildStart) {
        const elapsedSec = (Date.now() - customerBuildStart) / 1000;
        const speedFactor = Math.max(0, 1 - elapsedSec / 15);
        tip = Math.round(6 * speedFactor);
      }

      money += earnings + tip;
      updateTopBar();

      // Money animation
      if (earnings + tip > 0) {
        const rect = moneyLabel.getBoundingClientRect();
        sparkleMoney(rect.left + rect.width / 2, rect.top);
        moneyLabel.classList.add("coin-bounce");
        setTimeout(() => moneyLabel.classList.remove("coin-bounce"), 500);
      }

      customersServedToday++;
      updateCustomerProgress();

      dayEarnings.push({
        name: currentCustomerName,
        earnings: earnings, tip: tip,
        scoreParts: totalScore, totalParts: totalMaxParts
      });

      // Build short one-line result for the slim result bar
      let text = "";
      if (timeUp) {
        text += "<span class='text-bad'>Time's up!</span> ";
      }
      if (totalScore === totalMaxParts) {
        text += "<span class='text-good'>Perfect!</span> ";
        const rect = builderVisualEl.getBoundingClientRect();
        celebratePerfect(rect.left + rect.width/2, rect.top + rect.height/2);
      } else if (totalScore >= totalMaxParts * 0.66) {
        text += "<span class='text-good'>Close!</span> ";
      } else if (totalScore >= totalMaxParts * 0.33) {
        text += "<span class='text-bad'>Partial.</span> ";
      } else {
        text += "<span class='text-bad'>Wrong.</span> ";
        document.getElementById("gameRoot").classList.add("wrong-shake");
        setTimeout(() => document.getElementById("gameRoot").classList.remove("wrong-shake"), 500);
      }
      text += `${totalScore}/${totalMaxParts}`;
      if (refund > 0) {
        text += ` −$${refund}`;
      } else {
        text += ` +$${earnings}`;
      }
      if (tip > 0) {
        text += ` <span class='text-good'>+$${tip} tip</span>`;
      }

      for (let i = 0; i < numOrders; i++) {
        const co = currentOrders[i];
        const po = playerOrders[i];
        const r = perOrderResults[i];
        const label = numOrders > 1 ? `Ice Cream ${i + 1}: ` : "";
        const correctDesc = describeOrder(co);
        text += `<br><small style="opacity:0.8">${label}${correctDesc}</small>`;
        const containerIcon = po.container === co.container ? "\u2713" : "\u2717";
        const scoopsIcon = r.scoopMatch ? "\u2713" : "\u2717";
        const toppingsIcon = r.toppingsMatch ? "\u2713" : "\u2717";
        text += `<br><small>`;
        text += `<span class="${po.container === co.container ? 'text-good' : 'text-bad'}">${containerIcon} Container</span> \u00b7 `;
        text += `<span class="${r.scoopMatch ? 'text-good' : 'text-bad'}">${scoopsIcon} Scoops</span> \u00b7 `;
        text += `<span class="${r.toppingsMatch ? 'text-good' : 'text-bad'}">${toppingsIcon} Toppings</span>`;
        text += `</small>`;
      }

      resultTextEl.innerHTML = text;

      const tabsEl = document.getElementById("orderTabs");
      tabsEl.classList.add("hidden");
      tabsEl.innerHTML = "";

      if (dayTimeLeft <= 0) {
        endDaySummary();
      } else {
        nextCustomerBtn.disabled = false;
        nextCustomerBtn.textContent = "Next Customer";
      }
    }

    function endDaySummary() {
      clearInterval(dayTimerId);
      dayTimerId = null;
      openShopBtn.disabled = false;
      nextCustomerBtn.disabled = true;
      timerEl.textContent = "";
      timerBarEl.style.width = "0%";
      timerBarEl.className = "";
      setTutorialMessage("Day finished!");

      endOfDayPanelEl.classList.remove("hidden");
      endOfDayPanelEl.innerHTML =
        `<strong>Day ${day} done!</strong> ${customersServedToday} served · <strong>$${money}</strong>`;

      nextCustomerBtn.textContent = "Day Over";

      let breakdownHtml = "";
      if (dayEarnings.length > 0) {
        breakdownHtml += `<div style="text-align:left; margin-top:8px; font-size:0.85rem;">`;
        let dayTotal = 0;
        dayEarnings.forEach(e => {
          const total = e.earnings + e.tip;
          dayTotal += total;
          const color = e.scoreParts === e.totalParts ? "var(--good)" :
                        e.scoreParts >= 2 ? "#ff9800" : "var(--bad)";
          const icons = [];
          for (let i = 0; i < e.totalParts; i++) {
            icons.push(i < e.scoreParts ? "\u2713" : "\u2717");
          }
          let line = `<div style="padding:3px 0; border-bottom:1px dashed rgba(0,0,0,0.08);">`;
          line += `<span style="color:${color}; font-weight:600;">${e.name}</span>`;
          line += ` \u2014 $${e.earnings}`;
          if (e.tip > 0) line += ` + $${e.tip} tip`;
          line += ` <span style="opacity:0.6">${icons.join("")}</span>`;
          line += `</div>`;
          breakdownHtml += line;
        });
        breakdownHtml += `<div style="padding:4px 0; font-weight:bold;">Total: $${dayTotal}</div>`;
        breakdownHtml += `</div>`;
      }

      dayEndTitle.textContent = `Day ${day} Complete!`;
      dayEndStats.innerHTML =
        `<p>Customers served: <strong>${customersServedToday}</strong></p>` +
        `<p>Total money: <strong>$${money}</strong></p>` +
        breakdownHtml;
      requestAnimationFrame(() => {
        dayEndOverlay.classList.add("active");
      });
    }

    // ====================================================================
    //  UTILITY
    // ====================================================================
    function typewriterEffect(element, text, speed, callback) {
      element.textContent = "";
      let i = 0;
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        } else if (callback) {
          callback();
        }
      }
      type();
    }

    function updateCustomerProgress() {
      customerProgressEl.innerHTML = "";
      for (let i = 0; i < customersServedToday; i++) {
        const dot = document.createElement("div");
        dot.className = "progress-dot served";
        customerProgressEl.appendChild(dot);
      }
      if (phase !== "idle" && dayTimeLeft > 0) {
        const dot = document.createElement("div");
        dot.className = "progress-dot current";
        customerProgressEl.appendChild(dot);
      }
    }

    // ====================================================================
    //  NOTEPAD
    // ====================================================================
    const notepadPanel = document.getElementById("notepadPanel");
    const notepadCanvas = document.getElementById("notepadCanvas");
    const notepadCtx = notepadCanvas.getContext("2d");
    let notepadColor = "#2c1810";
    let notepadDrawing = false;
    let notepadEraser = false;

    function initNotepadCanvas() {
      const rect = notepadCanvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      notepadCanvas.width = rect.width * dpr;
      notepadCanvas.height = rect.height * dpr;
      notepadCtx.scale(dpr, dpr);
      notepadCtx.lineCap = "round";
      notepadCtx.lineJoin = "round";
    }

    function clearNotepad() {
      const rect = notepadCanvas.getBoundingClientRect();
      notepadCtx.clearRect(0, 0, rect.width, rect.height);
    }

    function notepadPos(e) {
      const rect = notepadCanvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
    }

    function notepadStart(e) {
      e.preventDefault();
      notepadDrawing = true;
      const pos = notepadPos(e);
      notepadCtx.beginPath();
      notepadCtx.moveTo(pos.x, pos.y);
    }
    function notepadMove(e) {
      if (!notepadDrawing) return;
      e.preventDefault();
      const pos = notepadPos(e);
      notepadCtx.strokeStyle = notepadEraser ? "#fffef6" : notepadColor;
      notepadCtx.lineWidth = notepadEraser ? 16 : 2.5;
      notepadCtx.lineTo(pos.x, pos.y);
      notepadCtx.stroke();
    }
    function notepadEnd(e) {
      notepadDrawing = false;
    }

    notepadCanvas.addEventListener("mousedown", notepadStart);
    notepadCanvas.addEventListener("mousemove", notepadMove);
    notepadCanvas.addEventListener("mouseup", notepadEnd);
    notepadCanvas.addEventListener("mouseleave", notepadEnd);
    notepadCanvas.addEventListener("touchstart", notepadStart, { passive: false });
    notepadCanvas.addEventListener("touchmove", notepadMove, { passive: false });
    notepadCanvas.addEventListener("touchend", notepadEnd);

    document.querySelectorAll("#notepadPanel .notepad-color-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const c = btn.dataset.color;
        if (c === "clear") { clearNotepad(); return; }
        document.querySelectorAll("#notepadPanel .notepad-color-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if (c === "eraser") {
          notepadEraser = true;
        } else {
          notepadEraser = false;
          notepadColor = c;
        }
      });
    });

    let notepadInited = false;
    function showNotepad() {
      if (!hasNotepad) return;
      notepadPanel.classList.remove("hidden");
      if (!notepadInited) {
        notepadInited = true;
        requestAnimationFrame(() => initNotepadCanvas());
      }
    }

    // ====================================================================
    //  EVENT WIRING
    // ====================================================================
    submitOrderBtn.addEventListener("click", () => {
      if (!roundActive) return;
      evaluateOrder(false);
    });

    nextCustomerBtn.addEventListener("click", () => {
      if (dayTimeLeft <= 0 && dayTimerId === null && customersServedToday > 0) return;
      nextCustomerBtn.disabled = true;
      startCustomerRound();
    });

    openShopBtn.addEventListener("click", () => { openShop(); });
    shopCloseBtn.addEventListener("click", () => { closeShopAndNextDay(); });

    dayEndContinueBtn.addEventListener("click", () => {
      dayEndOverlay.classList.remove("active");
      setTimeout(() => { openShop(); }, 300);
    });

    // Rubbish bin tap — clear entire order
    rubbishBinEl.addEventListener("click", () => {
      if (phase !== "build" || !roundActive) return;
      playerOrder.container = null;
      playerOrder.scoops = [];
      playerOrder.toppings.clear();
      refreshSelectionStates();
      updateBuilderSteps();
      maybeEnableServe();
      renderBuilderVisual();
      renderOrderTabs();
      playSound("invalid");
    });

    // ====================================================================
    //  PREVENT DOUBLE-TAP ZOOM (iOS)
    // ====================================================================
    let lastTouchEnd = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    // ====================================================================
    //  INIT
    // ====================================================================
    (async function init() {
      await preloadSVGAssets();
      refreshCounterShelf();
      refreshIngredientTray();
      setBuilderEnabled(false);
      startDay();
    })();
  </script>
</body>
</html>
